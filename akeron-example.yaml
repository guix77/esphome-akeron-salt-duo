substitutions:
  device_name: akeron-pool
  friendly_name: "Akeron Pool"
  akeron_mac: "XX:XX:XX:XX:XX:XX"  # Replace with your Akeron's BLE MAC address

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf  # Required for reliable BLE client
    sdkconfig_options:
      # Run at 160 MHz instead of 240 MHz — reduces heat significantly.
      # BLE + WiFi still work fine at 160 MHz.
      CONFIG_ESP32_DEFAULT_CPU_FREQ_160: "y"
      CONFIG_ESP32_DEFAULT_CPU_FREQ_240: "n"

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

external_components:
  - source:
      type: local
      path: components

# Stop BLE scanning once the device is connected.
# continuous: false  → one scan burst on boot/reconnect, then stops.
# active: false      → passive scan (no scan-request packets), saves RF power.
# Without this, the BLE scanner runs non-stop alongside WiFi and causes heating.
esp32_ble_tracker:
  scan_parameters:
    continuous: false
    active: false

ble_client:
  - mac_address: ${akeron_mac}
    id: akeron_ble

akeron:
  ble_client_id: akeron_ble
  update_interval: 60s  # default 60s; reduce to 30s if you need faster updates

sensor:
  - platform: akeron
    ph:
      name: "pH"
    ph_setpoint:
      name: "pH Setpoint"
    elx_production:
      name: "Electrolysis Production"
    boost_duration:
      name: "Boost Duration"
    last_update:
      name: "Frames Received"  # diagnostic — counter, increments on each valid BLE frame
    # --- Uncomment for REGUL3 / REGUL4 models ---
    # temperature:
    #   name: "Water Temperature"
    # salt:
    #   name: "Salt Level"
    # redox:
    #   name: "Redox"
    # redox_setpoint:
    #   name: "Redox Setpoint"

binary_sensor:
  - platform: akeron
    ph_pump_active:
      name: "pH Pump"
    elx_active:
      name: "Electrolysis Active"
    boost_active:
      name: "Boost Active"
    # --- Uncomment as needed ---
    # pumps_forced:
    #   name: "Pumps Forced"
    cover_active:
      name: "Cover Active"
    # flow_switch:
    #   name: "Flow Switch"

text_sensor:
  - platform: akeron
    alarm_elx:
      name: "Electrolysis Alarm"
    alarm_regulator:
      name: "Regulator Alarm"
    warning:
      name: "Warning"
    connection_status:
      name: "BLE Connection"  # diagnostic — shows Connected / Connecting / Disconnected

# Writable controls — expose these to set values from Home Assistant
# Note: if you use the number entities, the read-only sensor equivalents
# (ph_setpoint sensor, elx_production sensor) are redundant — the number
# entities also reflect the confirmed value received from the device.
number:
  - platform: akeron
    ph_setpoint:
      name: "pH Setpoint"
    elx_production:
      name: "Electrolysis Production"

# Use this if your Akeron has no physical cover cable connected.
# Turning it ON tells the Akeron the cover is closed (stops ELX).
# Turning it OFF tells the Akeron the cover is open (resumes ELX).
# switch:
#   - platform: akeron
#     cover_force:
#       name: "Force Cover Mode"