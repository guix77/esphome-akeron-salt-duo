substitutions:
  device_name: akeron-pool
  friendly_name: "Akeron Pool"
  akeron_mac: "XX:XX:XX:XX:XX:XX"  # Replace with your Akeron's BLE MAC address

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf  # Required for reliable BLE client

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

external_components:
  - source:
      type: local
      path: components

ble_client:
  - mac_address: ${akeron_mac}
    id: akeron_ble

akeron:
  ble_client_id: akeron_ble
  update_interval: 30s

sensor:
  - platform: akeron
    ph:
      name: "pH"
    ph_setpoint:
      name: "pH Setpoint"
    elx_production:
      name: "Electrolysis Production"
    boost_duration:
      name: "Boost Duration"
    # --- Uncomment for REGUL3 / REGUL4 models ---
    # temperature:
    #   name: "Water Temperature"
    # salt:
    #   name: "Salt Level"
    # redox:
    #   name: "Redox"
    # redox_setpoint:
    #   name: "Redox Setpoint"

binary_sensor:
  - platform: akeron
    ph_pump_active:
      name: "pH Pump"
    elx_active:
      name: "Electrolysis Active"
    boost_active:
      name: "Boost Active"
    # --- Uncomment as needed ---
    # pumps_forced:
    #   name: "Pumps Forced"
    # cover_active:
    #   name: "Cover Active"
    # flow_switch:
    #   name: "Flow Switch"

text_sensor:
  - platform: akeron
    alarm_elx:
      name: "Electrolysis Alarm"
    alarm_regulator:
      name: "Regulator Alarm"
    warning:
      name: "Warning"
